<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fellows' Portal | Stirling Hunt House</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav>

<div class="logo-text">
STIRLING HUNT HOUSE
</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="publications.html">Publications</a></li>
</ul>

</nav>

<header class="hero">

<h1>FELLOWS' PORTAL</h1>

<h2>Stirling Hunt House</h2>

<p class="subtitle">
Access is restricted to Fellows of the Society.
</p>

<input
type="email"
id="email"
placeholder="Email address">

<br><br>

<input
type="password"
id="password"
placeholder="Password">

<br><br>

<button class="button" id="loginButton">
Sign In
</button>

<p id="message"></p>

</header>

<script>

const supabaseUrl = "https://ayvcbbgtlzxifjxahjul.supabase.co";
const supabaseKey = "sb_publishable_rrOHc1sQEbF2B99zbBbLSg_c9if1TXv";

const supabase = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

document.getElementById("loginButton").addEventListener("click", login);

async function login(){

    const email =
        document.getElementById("email").value.trim();

    const password =
        document.getElementById("password").value;

    const message =
        document.getElementById("message");

    message.innerHTML = "Signing in...";

    const { error } =
        await supabase.auth.signInWithPassword({

            email,
            password

        });

    if(error){

        message.innerHTML = error.message;
        return;

    }

    window.location.href="portal.html";

}

</script>

</body>
</html>
