<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signing Out | Stirling Hunt House</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header class="hero">

<h1>Signing Out...</h1>

<p class="subtitle">
Please wait while your secure session is ended.
</p>

</header>

<script>

const supabase = window.supabase.createClient(
    "https://ayvcbbgtlzxifjxahjul.supabase.co",
    "sb_publishable_rrOHc1sQEbF2B99zbBbLSg_c9if1TXv"
);

(async () => {

    try {

        const { error } = await supabase.auth.signOut({
            scope: "local"
        });

        if (error) {
            document.body.innerHTML = `
                <header class="hero">
                    <h1>Logout Failed</h1>
                    <p class="subtitle">${error.message}</p>
                    <a class="button" href="portal.html">Return to Portal</a>
                </header>
            `;
            return;
        }

        window.location.replace("institute.html");

    } catch (err) {

        document.body.innerHTML = `
            <header class="hero">
                <h1>Unexpected Error</h1>
                <p class="subtitle">${err.message}</p>
                <a class="button" href="portal.html">Return to Portal</a>
            </header>
        `;

    }

})();

</script>

</body>

</html>
