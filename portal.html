<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
    "https://ayvcbbgtlzxifjxahjul.supabase.co",
    "sb_publishable_rrOHc1sQEbF2B99zbBbLSg_c9if1TXv"
);

(async function () {

    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
        window.location.replace("institute.html");
        return;
    }

})();

document.getElementById("logoutButton").onclick = async function () {

    this.disabled = true;
    this.innerText = "Signing Out...";

    try {

        await supabase.auth.signOut();

    } catch (e) {
        alert("Logout failed");
    }

    window.location.replace("institute.html");

};

</script>
